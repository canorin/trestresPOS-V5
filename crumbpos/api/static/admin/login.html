<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crumb · Iniciar sesión</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/admin/theme.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-bg-alt);
      border-radius: var(--radius-lg);
      padding: 48px 44px;
    }
    .login-brand {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .login-brand img { height: 55px; }
    .login-title {
      text-align: center;
      font-size: var(--text-heading);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-subtitle {
      text-align: center;
      color: var(--color-text-secondary);
      font-size: var(--text-caption);
      margin-bottom: 32px;
    }
    .login-card .field { margin-bottom: 14px; }
    .login-card .btn { width: 100%; margin-top: 10px; }
    footer {
      text-align: center;
      padding: 24px;
      color: var(--color-text-tertiary);
      font-size: var(--text-small);
    }
    footer img {
      height: 18px; width: auto;
      opacity: 0.85;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <main>
    <div class="login-card">
      <div class="login-brand">
        <img src="/static/logo-blue.svg" alt="Crumb">
      </div>
      <h1 class="login-title">Consola Super Admin</h1>
      <p class="login-subtitle">Accede para gestionar clientes y certificaciones.</p>

      <div id="alert-container"></div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" autocomplete="email" required
                 placeholder="matias@trestres.cl">
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-submit">Iniciar sesión</button>
      </form>
    </div>
  </main>
  <footer>
    <a href="https://trestres.cl" target="_blank" rel="noopener" style="display:inline-block;opacity:0.85;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'"><img src="/static/copy.svg" alt="Trestres" style="height:18px;width:auto;vertical-align:middle;"></a>
  </footer>

  <script>
    const TOKEN_KEY = 'ttpos_token';
    const USER_KEY = 'ttpos_user';

    // Si ya hay sesión válida de super_admin, redirigir al main.
    // Si hay token pero no es super_admin (ej. residuo del wizard como admin_empresa),
    // limpiar y mostrar el formulario para evitar loop con main.html.
    (function () {
      const existingToken = localStorage.getItem(TOKEN_KEY);
      const existingUserRaw = localStorage.getItem(USER_KEY);
      if (!existingToken || !existingUserRaw) return;
      try {
        const u = JSON.parse(existingUserRaw);
        if (u && u.rol === 'super_admin') {
          window.location.replace('/admin');
        } else {
          localStorage.removeItem(TOKEN_KEY);
          localStorage.removeItem(USER_KEY);
        }
      } catch {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
      }
    })();

    function showAlert(tipo, mensaje) {
      const c = document.getElementById('alert-container');
      c.innerHTML = `<div class="alert alert-${tipo}">${escapeHtml(mensaje)}</div>`;
    }
    function escapeHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-submit');

      btn.disabled = true;
      btn.textContent = 'Conectando...';
      document.getElementById('alert-container').innerHTML = '';

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          showAlert('error', err.detail || `Error ${resp.status}`);
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
          return;
        }
        const data = await resp.json();
        if (data.usuario.rol !== 'super_admin') {
          showAlert('error', 'Esta consola es solo para super administradores.');
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
          return;
        }
        localStorage.setItem(TOKEN_KEY, data.access_token);
        localStorage.setItem(USER_KEY, JSON.stringify(data.usuario));
        window.location.replace('/admin');
      } catch (err) {
        showAlert('error', `Error de red: ${err.message}`);
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
