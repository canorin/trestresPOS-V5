<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentos emitidos · Crumb</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/admin/theme.css">
  <style>
    main { padding: 36px 24px 80px; max-width: 1140px; margin: 0 auto; }.b-pendiente { background: var(--color-etapa-proceso-bg); color: var(--color-etapa-proceso-fg); }
    .b-enviado   { background: var(--color-etapa-proceso-bg); color: var(--color-etapa-proceso-fg); }
    .b-aceptado  { background: var(--color-etapa-produccion-bg); color: var(--color-etapa-produccion-fg); }
    .b-rechazado { background: var(--color-etapa-pendiente-bg); color: var(--color-etapa-pendiente-fg); }
    .b-reparo    { background: var(--color-etapa-proceso-bg); color: var(--color-etapa-proceso-fg); }
    .b-error     { background: var(--color-etapa-pendiente-bg); color: var(--color-etapa-pendiente-fg); }

    .badge-tipo {
      display: inline-flex; padding: 2px 7px; border-radius: var(--radius-pill);
      font-size: 11px; font-weight: 600;
      background: var(--color-bg-alt); color: var(--color-text-secondary);
      border: 1px solid var(--color-border-light); margin-right: 4px;
    }

    /* Paginación */
    .pag-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid var(--color-border-light);
      background: var(--color-bg-alt); font-size: var(--text-caption);
      color: var(--color-text-secondary);
    }

    /* Empty / loading */
    .placeholder-row td {
      text-align: center; padding: 56px 24px;
      color: var(--color-text-secondary);
    }
    .placeholder-row svg { margin: 0 auto 12px; display: block; opacity: .3; }</style>
</head>
<body>
  <nav class="topnav topnav-dark">
    <img src="/static/logo-light.svg" alt="Crumb">
    <div class="right">
      <span id="nav-razon">—</span>
      <a href="#" class="topnav-action" id="btn-logout">Salir</a>
    </div>
  </nav>

  <main>
    <a class="breadcrumb" href="#" id="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      Facturación
    </a>

    <div class="page-header">
      <h1>Documentos emitidos</h1>
      <p>Historial completo de DTEs enviados al SII con estado, track ID y folio.</p>
    </div>

    <div id="page-banner" class="banner"></div>

    <!-- Filtros -->
    <div class="filters">
      <select class="filter-select" id="f-tipo">
        <option value="">Todos los tipos</option>
        <option value="33">T33 — Factura</option>
        <option value="34">T34 — Factura exenta</option>
        <option value="39">T39 — Boleta</option>
        <option value="41">T41 — Boleta exenta</option>
        <option value="52">T52 — Guía de despacho</option>
        <option value="56">T56 — Nota de débito</option>
        <option value="61">T61 — Nota de crédito</option>
      </select>
      <select class="filter-select" id="f-estado">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente envío</option>
        <option value="enviado">Enviado al SII</option>
        <option value="aceptado">Aceptado</option>
        <option value="rechazado">Rechazado</option>
        <option value="reparo">Reparo</option>
        <option value="error_envio">Error de envío</option>
      </select>
      <input class="filter-input" type="date" id="f-desde" title="Fecha desde">
      <input class="filter-input" type="date" id="f-hasta" title="Fecha hasta">
      <button class="btn btn-secondary" id="btn-filtrar">Filtrar</button>
      <button class="btn btn-ghost"      id="btn-limpiar">Limpiar</button>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Folio</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Receptor</th>
            <th class="td-right">Monto total</th>
            <th>Estado SII</th>
            <th>Track ID</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="placeholder-row"><td colspan="7">Cargando…</td></tr>
        </tbody>
      </table>
      <div class="pag-row" id="pag-row" style="display:none;">
        <span id="pag-info"></span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" id="btn-prev" disabled>← Anterior</button>
          <button class="btn btn-ghost" id="btn-next">Siguiente →</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    /* ── Auth ─────────────────────────────────────────────────────── */
    const EMPRESA_RUT = window.location.pathname.split('/')[1];
    const TOKEN_KEY   = `ttpos_token_${EMPRESA_RUT}`;
    const USER_KEY    = `ttpos_user_${EMPRESA_RUT}`;

    function requireAuth() {
      const token = localStorage.getItem(TOKEN_KEY);
      const raw   = localStorage.getItem(USER_KEY);
      if (!token || !raw) { window.location.replace(`/${EMPRESA_RUT}/login`); return null; }
      try {
        const user = JSON.parse(raw);
        if (!user || user.empresa_rut !== EMPRESA_RUT) {
          localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY);
          window.location.replace(`/${EMPRESA_RUT}/login`); return null;
        }
        if (user.rol === 'super_admin' && !user.shadow) {
          localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY);
          window.location.replace(`/${EMPRESA_RUT}/login`); return null;
        }
        return { token, user };
      } catch { window.location.replace(`/${EMPRESA_RUT}/login`); return null; }
    }

    const auth = requireAuth();
    if (!auth) throw new Error('no-auth');

    document.getElementById('back-link').href = `/${EMPRESA_RUT}/facturacion`;
    document.getElementById('btn-logout').onclick = e => {
      e.preventDefault();
      localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY);
      window.location.replace(`/${EMPRESA_RUT}/login`);
    };

    function apiHeaders() {
      return { 'Authorization': `Bearer ${auth.token}`, 'X-Empresa-Rut': EMPRESA_RUT };
    }

    function mostrarBanner(msg, tipo) {
      const b = document.getElementById('page-banner');
      b.textContent = msg;
      b.className = `banner visible ${tipo}`;
    }

    /* ── Datos empresa ──────────────────────────────────────────── */
    fetch('/api/empresas/mi-empresa', { headers: apiHeaders() })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d) return;
        document.getElementById('nav-razon').textContent = d.razon_social;
        document.title = `Documentos emitidos · ${d.razon_social}`;
      }).catch(() => {});

    /* ── Helpers de presentación ─────────────────────────────── */
    const TIPO_NOMBRE = {
      33: 'Factura', 34: 'Fac. exenta', 39: 'Boleta',
      41: 'Bol. exenta', 52: 'Guía despacho', 56: 'Nota débito', 61: 'Nota crédito',
    };

    const ESTADO_META = {
      pendiente:   { cls: 'b-pendiente', label: 'Pendiente' },
      enviado:     { cls: 'b-enviado',   label: 'Enviado' },
      aceptado:    { cls: 'b-aceptado',  label: 'Aceptado' },
      rechazado:   { cls: 'b-rechazado', label: 'Rechazado' },
      reparo:      { cls: 'b-reparo',    label: 'Reparo' },
      error_envio: { cls: 'b-error',     label: 'Error envío' },
    };

    function badgeEstado(estado) {
      const m = ESTADO_META[estado] || { cls: 'b-pendiente', label: estado };
      return `<span class="badge ${m.cls}">${m.label}</span>`;
    }

    function esc(s) {
      if (s == null) return '—';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatCLP(n) {
      if (n == null) return '—';
      return '$ ' + Number(n).toLocaleString('es-CL');
    }

    /* ── Tabla ───────────────────────────────────────────────── */
    let offset = 0;
    const LIMIT = 50;
    let total   = 0;

    async function cargar() {
      const tipo   = document.getElementById('f-tipo').value;
      const estado = document.getElementById('f-estado').value;
      const desde  = document.getElementById('f-desde').value;
      const hasta  = document.getElementById('f-hasta').value;

      const p = new URLSearchParams({ limit: LIMIT, offset });
      if (tipo)   p.set('tipo_dte',    tipo);
      if (estado) p.set('estado_sii',  estado);
      if (desde)  p.set('fecha_desde', desde);
      if (hasta)  p.set('fecha_hasta', hasta);

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '<tr class="placeholder-row"><td colspan="7">Cargando…</td></tr>';

      try {
        const res = await fetch(`/api/facturacion/emitidos?${p}`, { headers: apiHeaders() });
        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY);
          window.location.replace(`/${EMPRESA_RUT}/login`); return;
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          mostrarBanner(err.detail || 'Error cargando documentos', 'error');
          tbody.innerHTML = '<tr class="placeholder-row"><td colspan="7">Error cargando datos.</td></tr>';
          return;
        }
        const data = await res.json();
        total = data.total;

        if (!data.items.length) {
          tbody.innerHTML = `
            <tr class="placeholder-row"><td colspan="7">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
              </svg>
              <p>No se encontraron documentos con esos filtros.</p>
            </td></tr>`;
          document.getElementById('pag-row').style.display = 'none';
          return;
        }

        tbody.innerHTML = data.items.map(d => `
          <tr>
            <td><strong>${d.folio}</strong></td>
            <td>
              <span class="badge-tipo">T${d.tipo_dte}</span>${esc(TIPO_NOMBRE[d.tipo_dte])}
            </td>
            <td style="white-space:nowrap;">${esc(d.fecha_emision)}</td>
            <td>
              <div style="font-weight:500;">${esc(d.receptor_razon)}</div>
              <div style="color:var(--color-text-secondary);font-size:11px;">${esc(d.receptor_rut)}</div>
            </td>
            <td class="td-right">${formatCLP(d.monto_total)}</td>
            <td>
              ${badgeEstado(d.estado_sii)}
              ${d.glosa_sii ? `<div style="color:var(--color-text-secondary);font-size:11px;margin-top:2px;">${esc(d.glosa_sii)}</div>` : ''}
            </td>
            <td style="color:var(--color-text-secondary);font-size:11px;">${esc(d.track_id)}</td>
          </tr>
        `).join('');

        /* Paginación */
        const pagRow = document.getElementById('pag-row');
        pagRow.style.display = 'flex';
        document.getElementById('pag-info').textContent =
          `Mostrando ${offset + 1}–${Math.min(offset + LIMIT, total)} de ${total}`;
        document.getElementById('btn-prev').disabled = offset === 0;
        document.getElementById('btn-next').disabled = (offset + LIMIT) >= total;
      } catch(e) {
        mostrarBanner('Error inesperado: ' + e.message, 'error');
      }
    }

    document.getElementById('btn-filtrar').onclick = () => { offset = 0; cargar(); };
    document.getElementById('btn-limpiar').onclick = () => {
      ['f-tipo','f-estado','f-desde','f-hasta'].forEach(id => {
        document.getElementById(id).value = '';
      });
      offset = 0; cargar();
    };
    document.getElementById('btn-prev').onclick = () => { offset = Math.max(0, offset - LIMIT); cargar(); };
    document.getElementById('btn-next').onclick = () => { offset += LIMIT; cargar(); };

    cargar();
  </script>
</body>
</html>
